# Apache reverse proxy for grafana.uprit.edu.pe
#
# Install on the VPS:
#   sudo cp deploy/apache/grafana.uprit.edu.pe.conf /etc/apache2/sites-available/grafana.conf
#   sudo a2ensite grafana
#   sudo apachectl configtest && sudo systemctl reload apache2
#   sudo certbot --apache -d grafana.uprit.edu.pe
#
# Set in /opt/chatbot-uprit/.env:
#   GRAFANA_ROOT_URL=https://grafana.uprit.edu.pe
# Then: docker compose up -d grafana

<VirtualHost *:80>
    ServerName grafana.uprit.edu.pe
    ServerAdmin soporte@uprit.edu.pe

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:3000/$1 [P,L]

    ErrorLog ${APACHE_LOG_DIR}/grafana-error.log
    CustomLog ${APACHE_LOG_DIR}/grafana-access.log combined
</VirtualHost>
