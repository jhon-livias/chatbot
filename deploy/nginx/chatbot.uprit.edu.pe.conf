# Nginx reverse proxy for chatbot.uprit.edu.pe
#
# Bootstrap (HTTP only, before certbot):
#   sudo cp deploy/nginx/chatbot.uprit.edu.pe.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/chatbot.uprit.edu.pe.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (once DNS points to this server):
#   sudo certbot --nginx -d chatbot.uprit.edu.pe

upstream chatbot_app {
    server 127.0.0.1:8090;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name chatbot.uprit.edu.pe;

    client_max_body_size 2m;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /health {
        proxy_pass         http://chatbot_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /webhook {
        proxy_pass         http://chatbot_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Hub-Signature-256 $http_x_hub_signature_256;
        proxy_read_timeout 30s;
    }
}
