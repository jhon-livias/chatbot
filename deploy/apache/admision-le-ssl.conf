# Apache SSL — admision.uprit.edu.pe (generado/actualizado tras certbot)
#
# Install:
#   sudo cp deploy/apache/admision-le-ssl.conf /etc/apache2/sites-available/admision-le-ssl.conf
#   sudo a2ensite admision-le-ssl
#   sudo apachectl configtest && sudo systemctl reload apache2

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName admision.uprit.edu.pe
    ServerAdmin soporte@uprit.edu.pe

    DocumentRoot /opt/chatbot-uprit/admin/dist

    ProxyPreserveHost On
    ProxyPass /api/v1/ws ws://127.0.0.1:8090/api/v1/ws
    ProxyPassReverse /api/v1/ws ws://127.0.0.1:8090/api/v1/ws
    ProxyPass /api/ http://127.0.0.1:8090/api/
    ProxyPassReverse /api/ http://127.0.0.1:8090/api/

    <Directory /opt/chatbot-uprit/admin/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_URI} !^/api/
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/admision-error.log
    CustomLog ${APACHE_LOG_DIR}/admision-access.log combined

    SSLCertificateFile /etc/letsencrypt/live/admision.uprit.edu.pe/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/admision.uprit.edu.pe/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
