# Apache — grafana.uprit.edu.pe (HTTPS, certbot-managed)
#
# Install:
#   sudo cp deploy/apache/grafana.uprit.edu.pe.conf /etc/apache2/sites-available/grafana.conf
#   sudo cp deploy/apache/grafana-le-ssl.conf /etc/apache2/sites-available/grafana-le-ssl.conf
#   sudo a2ensite grafana grafana-le-ssl
#   sudo apachectl configtest && sudo systemctl reload apache2
#   sudo certbot --apache -d grafana.uprit.edu.pe   # if cert missing

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName grafana.uprit.edu.pe
    ServerAdmin soporte@uprit.edu.pe

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:3000/$1 [P,L]

    ErrorLog ${APACHE_LOG_DIR}/grafana-error.log
    CustomLog ${APACHE_LOG_DIR}/grafana-access.log combined

    SSLCertificateFile /etc/letsencrypt/live/grafana.uprit.edu.pe/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/grafana.uprit.edu.pe/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
