# Promtail — recolecta logs de contenedores Docker y los envía a Loki.
# Documentación: https://grafana.com/docs/loki/latest/send-data/promtail/configuration/

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Descubrimiento automático de contenedores Docker ───────────────────────
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["logging=promtail"]

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      - source_labels: ['__meta_docker_container_label_app']
        target_label: app
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service

    pipeline_stages:
      # Parsea logs JSON emitidos por Pino (level, msg, time, service, etc.)
      - json:
          expressions:
            level: level
            msg: msg
            time: time
            service: service
            env: env
      - labels:
          level:
          service:
          env:
      - timestamp:
          source: time
          format: RFC3339Nano
      - output:
          source: msg

  # ── Logs del propio stack de observabilidad ────────────────────────────────
  - job_name: observability-stack
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: name
            values: ['chatbot-uprit-loki', 'chatbot-uprit-promtail', 'chatbot-uprit-grafana']

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
