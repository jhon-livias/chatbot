# Apache reverse proxy for chatbot.uprit.edu.pe (production VPS uses Apache, not Nginx).
#
# Install:
#   sudo cp deploy/apache/chatbot.uprit.edu.pe.conf /etc/apache2/sites-available/chatbot.conf
#   sudo a2ensite chatbot
#   sudo apachectl configtest && sudo systemctl reload apache2
#   sudo certbot --apache -d chatbot.uprit.edu.pe
#
# API_PORT in .env must match the ProxyPass port (default 8090).

<VirtualHost *:80>
    ServerName chatbot.uprit.edu.pe
    ServerAdmin soporte@uprit.edu.pe

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8090/
    ProxyPassReverse / http://127.0.0.1:8090/

    ErrorLog ${APACHE_LOG_DIR}/chatbot-error.log
    CustomLog ${APACHE_LOG_DIR}/chatbot-access.log combined

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =chatbot.uprit.edu.pe
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
