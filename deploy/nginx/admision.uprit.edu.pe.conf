# Nginx — admision.uprit.edu.pe (panel React asesores + proxy /api)
#
# Bootstrap (HTTP only, before certbot):
#   sudo cp deploy/nginx/admision.uprit.edu.pe.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/admision.uprit.edu.pe.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requisitos previos:
#   - DNS A admision.uprit.edu.pe → IP del VPS (misma que chatbot)
#   - npm run admin:build  (genera /opt/chatbot-uprit/admin/dist)
#   - Backend escuchando en 127.0.0.1:8090 (API_PORT en .env)
#
# SSL:
#   sudo certbot --nginx -d admision.uprit.edu.pe
#
# O usar el script completo:
#   bash deploy/setup-admision-domain.sh

upstream chatbot_api {
    server 127.0.0.1:8090;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name admision.uprit.edu.pe;

    root /opt/chatbot-uprit/admin/dist;
    index index.html;

    client_max_body_size 2m;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # SPA — React Router fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket realtime (admin panel) — must be before generic /api/
    location /api/v1/ws {
        proxy_pass         http://chatbot_api/api/v1/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # API → backend chatbot (same-origin en prod, sin CORS cross-domain)
    location /api/ {
        proxy_pass         http://chatbot_api/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection "";
        proxy_read_timeout 30s;
    }

    # Cache estático del build Vite
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
