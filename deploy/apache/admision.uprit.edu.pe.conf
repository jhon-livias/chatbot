# Apache — admision.uprit.edu.pe (panel React + proxy /api)
#
# Install:
#   sudo cp deploy/apache/admision.uprit.edu.pe.conf /etc/apache2/sites-available/admision.conf
#   sudo a2ensite admision
#   sudo apachectl configtest && sudo systemctl reload apache2
#   sudo certbot --apache -d admision.uprit.edu.pe
#
# DocumentRoot: /opt/chatbot-uprit/admin/dist (npm run admin:build)

<VirtualHost *:80>
    ServerName admision.uprit.edu.pe
    ServerAdmin soporte@uprit.edu.pe

    DocumentRoot /opt/chatbot-uprit/admin/dist

    # API proxy MUST be before SPA rewrite (FallbackResource breaks /api)
    ProxyPreserveHost On
    ProxyPass /api/v1/ws ws://127.0.0.1:8090/api/v1/ws
    ProxyPassReverse /api/v1/ws ws://127.0.0.1:8090/api/v1/ws
    ProxyPass /api/ http://127.0.0.1:8090/api/
    ProxyPassReverse /api/ http://127.0.0.1:8090/api/
    ProxyPass /media/ http://127.0.0.1:8090/media/
    ProxyPassReverse /media/ http://127.0.0.1:8090/media/

    <Directory /opt/chatbot-uprit/admin/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_URI} !^/api/
        RewriteCond %{REQUEST_URI} !^/media/
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/admision-error.log
    CustomLog ${APACHE_LOG_DIR}/admision-access.log combined

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =admision.uprit.edu.pe
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
